server {
    listen 80;
    server_name reservation.dmenergy.ae;

    root /var/www/reservation.dmenergy.ae;
    index index.html;
    client_max_body_size 20m;

    access_log /var/log/nginx/reservation.dmenergy.ae.access.log main;
    error_log  /var/log/nginx/reservation.dmenergy.ae.error.log;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    location /api/public/reservations/ {
        proxy_pass https://127.0.0.1:18001/api/public/reservations/;
        proxy_http_version 1.1;
        proxy_ssl_verify off;

        proxy_set_header Host kara.dmenergy.ae;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        proxy_set_header X-Forwarded-Port 80;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
