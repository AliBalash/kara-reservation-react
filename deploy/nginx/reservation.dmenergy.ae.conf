server {
    listen 80;
    server_name reservation.dmenergy.ae;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name reservation.dmenergy.ae;

    root /var/www/reservation.dmenergy.ae;
    index index.html;
    client_max_body_size 20m;

    access_log /var/log/nginx/reservation.dmenergy.ae.access.log main;
    error_log  /var/log/nginx/reservation.dmenergy.ae.error.log;

    ssl_certificate     /etc/letsencrypt/live/reservation.dmenergy.ae/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/reservation.dmenergy.ae/privkey.pem;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    location /api/public/reservations/ {
        proxy_pass https://127.0.0.1:18001/api/public/reservations/;
        proxy_http_version 1.1;
        proxy_ssl_verify off;

        proxy_set_header Host kara.dmenergy.ae;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port 443;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
